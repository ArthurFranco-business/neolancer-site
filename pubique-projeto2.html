<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publique seu projeto!</title>
    <link rel="shortcut icon" href="imagens/apple-touch-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="pagina_de_cadastro.css">
</head>

<body>
    <header>
        <img src="imagens/logonv.png" alt="NeoLancer Logo" class="logo" />
        <nav>
            <a class="btn-entrar abrir-login">Português (Brasil)</a>
        </nav>
    </header>



    <div class="form-container">
        <h2 class="form-title">Detalhes:</h2>

        <form class="project-form">

            <label for="titulo">Título do projeto:</label>
            <input type="text" id="titulo" class="input-text">

            <label for="descricao">Descrição:</label>
            <textarea id="descricao" class="input-area"></textarea>

            <label>Anexar arquivos:</label>
            <div class="file-wrapper">
                <span class="file-icon"> <img src="imagens/conexao.jfif" alt=""></span>
                <a href="#" class="file-link">Clique aqui</a>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="valor">Valor:</label>
                    <div class="valor-wrapper">
                        <span class="moeda">R$</span>
                        <input type="number" id="valor" class="valor-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="prazo">Prazo em dias:</label>
                    <input type="text" id="prazo" class="small-input">
                </div>

        </form>
    </div>
    <div class="navegacao">
        <a href="pubique-projeto1.html"><button>←</button></a>
        <a href="#"><button class="proximo">Publicar projeto</button></a>
    </div>
    <div class="progresso">
        <div class="step"></div>
        <div class="step ativo"></div>
        <div class="navegacao">
        </div>
    </div>
</div>
    <footer class="footer">
        <div class="footer-bottom">
            <img src="imagens/logonv.png" alt="NeoLancer" class="footer-logo" />
            <p>© 2025 - 2027 | <strong>NeoLancer</strong> - Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
