<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="shortcut icon" href="imagens/apple-touch-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="pagina_de_cadastro.css">
</head>

<body>
    <header>
        <img src="imagens/logonv.png" alt="NeoLancer Logo" class="logo" />
        <nav>
            <a href="#" class="cinza">Contato ↷</a>
            <a class="btn-entrar abrir-login">Português (Brasil)</a>
        </nav>
    </header>

    <div class="form-container">
        <h2>Dados Pessoais</h2>

        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
        </form>
        <div class="navegacao">
            <a href="cadastro1.html"><button>←</button></a>
            <a href="cadastro3.html"><button class="proximo">Próximo</button></a>
        </div>
        <div class="progresso">
            <div class="step ativo"></div>
            <div class="step"></div>
            <div class="step ativo"></div>
            <div class="step ativo"></div>
            <div class="navegacao">
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <img src="imagens/logonv.png" alt="NeoLancer" class="footer-logo" />
            <p>© 2025 - 2027 | <strong>NeoLancer</strong> - Todos os direitos reservados</p>
        </div>
    </footer>

</body>

</html>
